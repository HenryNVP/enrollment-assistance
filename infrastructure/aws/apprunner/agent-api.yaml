version: 1.0
runtime: docker
build:
  commands:
    build:
      - echo "No build needed - using pre-built image from ECR"
run:
  runtime-version: latest
  command: /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
    env: PORT
  env:
    - name: PORT
      value: "8000"
    # Database connection - update with your RDS endpoint
    - name: POSTGRES_HOST
      value: "your-rds-endpoint.region.rds.amazonaws.com"
    - name: POSTGRES_PORT
      value: "5432"
    - name: POSTGRES_DB
      value: "ragdb"
    - name: POSTGRES_USER
      value: "postgres"
    # Use AWS Secrets Manager for sensitive values
    - name: POSTGRES_PASSWORD
      value-from: "arn:aws:secretsmanager:region:account:secret:enrollment-assistant/db-password"
    # LLM configuration
    - name: OPENAI_API_KEY
      value-from: "arn:aws:secretsmanager:region:account:secret:enrollment-assistant/openai-api-key"
    - name: DEFAULT_LLM_MODEL
      value: "gpt-4o-mini"
    # JWT configuration
    - name: JWT_SECRET_KEY
      value-from: "arn:aws:secretsmanager:region:account:secret:enrollment-assistant/jwt-secret"
    # RAG API connection - use RAG API App Runner service URL
    - name: RAG_BASE_URL
      value: "https://your-rag-api-service-id.region.awsapprunner.com"
healthcheck:
  protocol: HTTP
  path: /health
  interval: 10
  timeout: 5
  healthy-threshold: 1
  unhealthy-threshold: 5
