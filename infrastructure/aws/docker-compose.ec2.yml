# EC2: all services on one instance (Postgres + RAG API + Agent API).
# Set in .env: ECR_REGISTRY (e.g. 123456789.dkr.ecr.us-west-2.amazonaws.com),
#              POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD,
#              OPENAI_API_KEY (and optional RAG_OPENAI_API_KEY).
# Then: docker compose -f docker-compose.ec2.yml up -d

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  rag_api:
    image: ${ECR_REGISTRY:?set ECR_REGISTRY in .env}/enrollment-assistant/rag-api:${IMAGE_TAG:-latest}
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      VECTOR_DB_TYPE: pgvector
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAG_OPENAI_API_KEY: ${RAG_OPENAI_API_KEY:-}
      COLLECTION_NAME: ${COLLECTION_NAME:-policy_docs}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${RAG_API_PORT:-8010}:8000"
    restart: always

  agent_api:
    image: ${ECR_REGISTRY:?set ECR_REGISTRY in .env}/enrollment-assistant/agent-api:${IMAGE_TAG:-latest}
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env}
      RAG_BASE_URL: http://rag_api:8000
    depends_on:
      - rag_api
    ports:
      - "${AGENT_API_PORT:-8000}:8000"
    restart: always

volumes:
  postgres-data:
