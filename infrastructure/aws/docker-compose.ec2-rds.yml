# EC2 + RDS: RAG API and Agent API on EC2, database on RDS (no local Postgres).
# Set in .env: ECR_REGISTRY, POSTGRES_HOST, POSTGRES_PASSWORD, POSTGRES_DB, POSTGRES_USER,
#              OPENAI_API_KEY, JWT_SECRET_KEY. For RDS set POSTGRES_SSLMODE=require.
# Run from /opt/enrollment-assistant: docker compose -f docker-compose.ec2-rds.yml up -d

services:
  rag_api:
    image: ${ECR_REGISTRY:?set ECR_REGISTRY in .env}/enrollment-assistant/rag-api:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      DB_HOST: ${POSTGRES_HOST:?set POSTGRES_HOST (RDS endpoint) in .env}
      DB_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
      VECTOR_DB_TYPE: pgvector
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAG_OPENAI_API_KEY: ${RAG_OPENAI_API_KEY:-}
      COLLECTION_NAME: ${COLLECTION_NAME:-policy_docs}
    ports:
      - "${RAG_API_PORT:-8010}:8000"
    restart: always

  agent_api:
    image: ${ECR_REGISTRY:?set ECR_REGISTRY in .env}/enrollment-assistant/agent-api:${IMAGE_TAG:-latest}
    env_file: .env
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_DB: ${POSTGRES_DB:-ragdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-require}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env}
      RAG_BASE_URL: http://rag_api:8000
    depends_on:
      - rag_api
    ports:
      - "${AGENT_API_PORT:-8000}:8000"
    restart: always
